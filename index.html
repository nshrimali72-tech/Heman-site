<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="ohRWBoR112oCbwgPPLXTv2cxhHXqbI-Us-SX_JdkhuA" />

<title>hemanthrone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    height:100vh;
}

.container{
    max-width:430px;
    margin:auto;
    padding:20px;
}

.title{
    font-size:32px;
    font-weight:700;
    margin-bottom:25px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:25px;
    overflow-x:auto;
}

.tab{
    padding:10px 16px;
    border-radius:14px;
    background:#151515;
    border:none;
    color:#888;
    cursor:pointer;
    transition:.2s;
    white-space:nowrap;
}

.tab.active{
    background:white;
    color:black;
}

.page{
    display:none;
}

.page.show{
    display:block;
}

.card{
    background:#151515;
    border-radius:24px;
    padding:22px;
}

.small{
    color:#777;
    font-size:14px;
    margin-bottom:12px;
}

.question{
    font-size:24px;
    line-height:1.4;
    margin-bottom:18px;
}

textarea,input{
    width:100%;
    background:#0f0f0f;
    border:none;
    outline:none;
    color:white;
    padding:16px;
    border-radius:18px;
    margin-top:10px;
    font-size:15px;
}

textarea{
    min-height:180px;
    resize:none;
}

.button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:18px;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
}

.course{
    margin-top:15px;
    padding:16px;
    border-radius:18px;
    background:#0f0f0f;
    font-size:18px;
}

</style>
</head>
<body>

<div class="container">

    <div class="title">
        Heman 🚀
    </div>

    <div class="tabs">
        <button class="tab active" onclick="openPage('daily',this)">
            Daily
        </button>

        <button class="tab" onclick="openPage('notes',this)">
            Notes
        </button>

        <button class="tab" onclick="openPage('course',this)">
            Course
        </button>

        <button class="tab" onclick="openPage('user',this)">
            User
        </button>
    </div>

    <div id="daily" class="page show">
        <div class="card">

            <div class="small">
                Daily Question
            </div>

            <div class="question">
                Find x:
                <br><br>
                x² - 5x + 6 = 0
            </div>

            <textarea placeholder="Your answer..."></textarea>

        </div>
    </div>

    <div id="notes" class="page">

        <div class="card">

            <div class="small">
                Personal Notes
            </div>

            <textarea placeholder="Write anything..."></textarea>

            <button class="button">
                Save
            </button>

        </div>

    </div>

    <div id="course" class="page">

        <div class="card">

            <div class="small">
                Current Course
            </div>

            <div class="course">
                Algebra Basics
            </div>

        </div>

    </div>

    <div id="user" class="page">

        <div class="card">

            <div class="small">
                Your User ID
            </div>

            <input type="text" placeholder="Enter your name">

            <button class="button">
                Save
            </button>

        </div>

    </div>

</div>

<script>

function openPage(pageId,button){

    let pages=document.querySelectorAll(".page");
    let tabs=document.querySelectorAll(".tab");

    pages.forEach(page=>{
        page.classList.remove("show");
    });

    tabs.forEach(tab=>{
        tab.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("show");

    button.classList.add("active");
}

</script>

</body>
</html>
